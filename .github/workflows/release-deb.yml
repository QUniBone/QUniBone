name: release-deb

# Tag-driven package release. Push a v* tag whose version matches the top of
# packaging/debian/changelog; this builds both boards' packages (qbone for QBUS,
# unibone for UNIBUS), attaches them to a GitHub Release for the tag, and pushes
# them to the Forgejo Debian registry so `apt install` sees them. The registry
# push skips itself when no token is configured, so the GitHub Release still
# happens on a fork or unconfigured repo.

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # create the GitHub Release and upload the assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            dpkg-dev device-tree-compiler gcc-arm-linux-gnueabihf libc6-dev-armhf-cross

      - name: Build both packages
        run: |
          ./crossbuild.sh                 # QBUS binary
          ./packaging/build-deb.sh        # -> qbone_<ver>_armhf.deb
          ./crossbuild.sh -u              # UNIBUS binary
          ./packaging/build-deb.sh -u     # -> unibone_<ver>_armhf.deb

      - name: Check the tag matches the changelog version
        # Both packages take their version from packaging/debian/changelog. A tag
        # that disagrees would ship differently-numbered artifacts than the tag
        # claims, so require the changelog version to be the tag, or the tag with
        # a Debian revision (v1.6.0 -> 1.6.0 or 1.6.0-1).
        run: |
          tag=${GITHUB_REF_NAME#v}
          for deb in *_armhf.deb; do
            debver=$(echo "$deb" | sed -n 's/^[a-z]*_\(.*\)_armhf\.deb$/\1/p')
            echo "$deb: changelog=$debver tag=$tag"
            case "$debver" in
              "$tag"|"$tag"-*) : ;;
              *) echo "tag $GITHUB_REF_NAME does not match $deb ($debver)" >&2; exit 1 ;;
            esac
          done

      - name: Publish the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" *_armhf.deb --clobber
          else
            gh release create "$GITHUB_REF_NAME" *_armhf.deb \
              --title "$GITHUB_REF_NAME" --generate-notes
          fi

      - name: Publish to the Debian registry
        env:
          REGISTRY_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          REGISTRY_URL: ${{ vars.DEBIAN_REGISTRY_URL }}
        run: |
          if [ -z "$REGISTRY_TOKEN" ] || [ -z "$REGISTRY_URL" ]; then
            echo "no registry configured - set the FORGEJO_TOKEN secret and the"
            echo "DEBIAN_REGISTRY_URL variable to publish; skipping."
            exit 0
          fi
          for deb in *_armhf.deb; do
            curl --fail-with-body -H "Authorization: token $REGISTRY_TOKEN" \
                --upload-file "$deb" \
                "$REGISTRY_URL/pool/trixie/main/upload"
          done
