name: build

# Continuous integration: build the emulator and the qbone package from nothing
# but this repository. The PRU firmware is compiled here too (crossbuild.sh
# fetches the TI code generation tools into a container), so no BeagleBone takes
# part. Releasing is separate: release-deb.yml on a tag, release-image.yml on
# demand.

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: QBUS
            flag: ''
            suffix: _q
          - platform: UNIBUS
            flag: '-u'
            suffix: _u
    steps:
      - uses: actions/checkout@v7

      - name: Install packaging tools
        # build-deb.sh runs natively when dpkg-deb and dtc are present, and
        # cross-compiles bone-leds with the armhf gcc; supply all three.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            dpkg-dev device-tree-compiler gcc-arm-linux-gnueabihf libc6-dev-armhf-cross

      - name: Cross-compile ${{ matrix.platform }}
        run: ./crossbuild.sh ${{ matrix.flag }}

      - name: Check the PRU firmware is reproducible
        # A second build from clean must land on the same instruction words.
        # The bus state machine's timing is what clpru's output decides, so a
        # firmware that varies between builds is not a firmware to ship.
        run: |
          mkdir -p /tmp/fw1
          cp 10.01_base/4_deploy${{ matrix.suffix }}/*_array.c /tmp/fw1/
          ./crossbuild.sh ${{ matrix.flag }} -p
          for f in /tmp/fw1/*_array.c; do
            cmp "$f" "10.01_base/4_deploy${{ matrix.suffix }}/$(basename "$f")"
          done
          echo "PRU firmware reproducible"

      - name: Build the package
        run: ./packaging/build-deb.sh ${{ matrix.flag }}

      - name: Check the package installs cleanly
        run: |
          deb=$(ls *_armhf.deb)
          dpkg-deb --info "$deb"
          dpkg-deb --contents "$deb"
          # lintian-style sanity: the maintainer scripts must at least parse
          dpkg-deb --control "$deb" /tmp/ctrl
          for s in postinst prerm postrm; do sh -n "/tmp/ctrl/$s"; done

      - uses: actions/upload-artifact@v7
        with:
          name: package-${{ matrix.platform }}
          path: '*_armhf.deb'
