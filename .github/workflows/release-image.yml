name: release-image

# Appliance images for both boards - qbone (QBUS) and unibone (UNIBUS) - built
# for every release. On a v* tag each image is built from that tag's package and
# attached to the tag's GitHub Release, beside the .debs, so a downloaded image
# always carries the release's package version. build-image.sh turns the rcn-ee
# base image into a card-ready image; the base image and each board's
# OS-images/configs come from the Actions variables BASE_IMAGE_URL,
# ASSETS_URL_QBONE and ASSETS_URL_UNIBONE (each set expands to images/ and
# configs/ at its top level). workflow_dispatch rebuilds images for an existing
# tag on demand.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to (re)build images for (defaults to the pushed tag)'
        required: false
      grow:
        description: 'Build headroom while customising (GROW)'
        required: false
        default: '4G'
      margin_mb:
        description: 'Free space left in the root filesystem after the shrink (MARGIN_MB)'
        required: false
        default: '400'

# The base OS version the images are built on, named in the release notes.
env:
  BASE_VERSION: 'Debian 13.6, base-v6.12 armhf (2026-07-15)'

permissions:
  contents: write   # create the GitHub Release and upload the images

jobs:
  image:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: qbone
            flag: ''
          - board: unibone
            flag: '-u'
    steps:
      - uses: actions/checkout@v7

      - name: Free up disk space
        # The base image, its 4G build headroom, and a working copy together
        # run to well over ten gigabytes; reclaim the runner's preinstalled
        # toolchains so the loop-mounted build has room.
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          df -h /

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            dpkg-dev device-tree-compiler gcc-arm-linux-gnueabihf libc6-dev-armhf-cross xz-utils

      - name: Build the ${{ matrix.board }} package
        run: |
          ./crossbuild.sh ${{ matrix.flag }}
          ./packaging/build-deb.sh ${{ matrix.flag }}

      - name: Assemble the staging directory
        env:
          BASE_IMAGE_URL: ${{ vars.BASE_IMAGE_URL }}
          ASSETS_URL_QBONE: ${{ vars.ASSETS_URL_QBONE }}
          ASSETS_URL_UNIBONE: ${{ vars.ASSETS_URL_UNIBONE }}
        run: |
          case "${{ matrix.board }}" in
            unibone) assets=$ASSETS_URL_UNIBONE ;;
            *)       assets=$ASSETS_URL_QBONE ;;
          esac
          [ -n "$BASE_IMAGE_URL" ] && [ -n "$assets" ] \
            || { echo "set the BASE_IMAGE_URL and ASSETS_URL_* repo variables" >&2; exit 1; }
          mkdir -p dist/images dist/configs
          cp ${{ matrix.board }}_*_armhf.deb dist/
          echo "-- fetching the base image"
          curl --fail-with-body -L -o dist/base.img.xz "$BASE_IMAGE_URL"
          echo "-- fetching the OS images and configs"
          curl --fail-with-body -L -o /tmp/assets.tar "$assets"
          tar -xf /tmp/assets.tar -C dist
          test -d dist/images && test -d dist/configs \
            || { echo "assets must contain images/ and configs/ at top level" >&2; exit 1; }
          ls dist dist/images dist/configs

      - name: Build the image
        env:
          GROW: ${{ inputs.grow || '4G' }}
          MARGIN_MB: ${{ inputs.margin_mb || '400' }}
          NAME: ${{ matrix.board }}
          # pre-configure the board's apt source (URL/key from private repo
          # variables, so the public workflow carries no repository URL)
          APT_REPO_URL: ${{ vars.APT_REPO_URL }}
          APT_REPO_KEY_URL: ${{ vars.APT_REPO_KEY_URL }}
        run: DIST=./dist ./packaging/build-image.sh

      - name: Compress the image
        # build-image.sh writes the image as root from its privileged container;
        # take ownership so xz can set the compressed file's group, then compress.
        run: |
          img=${{ matrix.board }}-dist.img
          sudo chown "$(id -u):$(id -g)" "$img"
          xz -T0 "$img"

      - name: Publish the image to a GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          img=${{ matrix.board }}-dist.img.xz
          tag='${{ inputs.release_tag || github.ref_name }}'
          # the deb and image jobs both target this one release; create is
          # best-effort (release-deb usually makes it first), then upload the asset
          gh release create "$tag" --title "$tag" \
            --notes "qbone and unibone packages and appliance images. Image base: $BASE_VERSION." 2>/dev/null || true
          gh release upload "$tag" "$img" --clobber

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.board }}-dist-image
          path: ${{ matrix.board }}-dist.img.xz
