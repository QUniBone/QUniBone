# Network for the emulated Ethernet controller.
#
# The DELQA binds a raw socket to its own interface, so it needs one of its
# own: a veth pair whose far end joins a bridge that also carries the uplink.
# The controller cannot bind to the uplink directly - a raw socket there
# cannot reach the BeagleBone itself.

# Interface the emulated controller binds to. Name it as the DELQA's
# "interface" parameter.
PDP_IF=veth-pdp

# Its far end, and the bridge that carries it. Leave BRIDGE empty and the
# pair is still created but joins nothing, which is the safe default: making
# the uplink a bridge port moves the host's address onto the bridge and is
# left to the machine's own network configuration. See
# /usr/share/doc/qbone/examples/interfaces-bridge for a working stanza.
PEER_IF=veth-br
BRIDGE=
