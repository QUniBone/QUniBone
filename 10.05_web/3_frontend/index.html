<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QBone</title>
<!-- Browsers that understand SVG icons take favicon.svg and scale it; the
     rest fall back to the .ico. The manifest is fetched without credentials
     unless it says otherwise, so behind the admin password it needs
     crossorigin, or it comes back 401 and the icons never load. -->
<link rel="icon" href="favicon.ico" sizes="32x32">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest" crossorigin="use-credentials">
<link rel="stylesheet" href="vendor/xterm.css">
<script src="vendor/xterm.js"></script>

<!--
  QBone web interface. Everything on screen comes from the backend: the
  device tree and its parameters over /api, hardware state and log lines
  over the /ws/events stream, terminals over /ws/console.

  STYLING IS CENTRALIZED: the ":root { }" DESIGN TOKENS block below is the
  single source of truth for color, type, radius and shadow. Component rules
  reference tokens only — restyle the whole app by editing that one block,
  or point claude.ai/design at it to apply a design system.
-->

<style>
/* ==================================================================
   DESIGN TOKENS — single source of truth for the visual system.
   Edit here (or via claude.ai/design); everything below only
   references these custom properties.
   ================================================================== */
:root {
  /* ground + surfaces */
  --bg:         #ECEEF0;
  --surface:    #FBFCFD;
  --surface-2:  #F1F3F5;
  --line:       #D5DAE0;
  --line-soft:  #E3E7EB;

  /* ink */
  --ink:        #1C2126;
  --ink-muted:  #5C6670;
  --ink-faint:  #8A939C;

  /* accent (DEC magenta) — interactive emphasis only */
  --accent:       #A63D63;
  --accent-soft:  #A63D6318;
  --on-accent:    #FFFFFF;

  /* semantic state — separate from accent */
  --ok:      #1E8A50;
  --ok-soft: #1E8A5018;
  --warn:      #B26E10;
  --warn-soft: #B26E1018;
  --err:      #BC3F3F;
  --err-soft: #BC3F3F18;

  /* terminal + virtual hardware panel: deliberately single-world,
     identical in both themes (they imitate physical equipment) */
  --term-bg:   #0B100C;
  --phosphor:  #3DF57F;
  --phosphor-dim: #2A9E55;
  --bezel:     #23262B;
  --bezel-2:   #2E3238;
  --lamp-off:  #43474D;
  /* RL02 drive front: warm off-white sheet metal, recessed switch plate */
  --rl-panel:      #E7E5DB;
  --rl-panel-edge: #C6C4B9;
  --rl-inset:      #F1EFE8;
  --rl-ink:        #46433C;   /* silkscreen legend */
  --rl-ink-dim:    #7A776E;
  --lamp-red:      #FF3B22;   /* panel indicator, lit */
  --lamp-red-hot:  #FF8A70;   /* the bright core of a lit lamp */
  --lamp-red-deep: #C21807;   /* shaded edge of the lens */

  /* type */
  --font-ui:   system-ui, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
  --fs-0: 0.72rem;   /* labels, chips */
  --fs-1: 0.82rem;   /* secondary text, table data */
  --fs-2: 0.92rem;   /* body */
  --fs-3: 1.05rem;   /* card titles */
  --fs-4: 1.35rem;   /* page titles */

  /* shape + elevation */
  --r-sm: 4px;
  --r-md: 8px;
  --shadow: 0 1px 2px rgba(15,20,25,.06), 0 2px 8px rgba(15,20,25,.05);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg:        #14171B;
    --surface:   #1D2228;
    --surface-2: #242B33;
    --line:      #313A44;
    --line-soft: #2A323B;
    --ink:       #E6EAEE;
    --ink-muted: #97A2AD;
    --ink-faint: #6C7883;
    --accent:      #D9678F;
    --accent-soft: #D9678F1E;
    --on-accent:   #1A0E13;
    --ok:      #46C280;  --ok-soft:   #46C2801E;
    --warn:    #E0A248;  --warn-soft: #E0A2481E;
    --err:     #E56A6A;  --err-soft:  #E56A6A1E;
    --shadow: 0 1px 2px rgba(0,0,0,.35), 0 2px 10px rgba(0,0,0,.25);
  }
}
/* viewer theme toggle must win in both directions */
:root[data-theme="light"] {
  --bg:#ECEEF0; --surface:#FBFCFD; --surface-2:#F1F3F5; --line:#D5DAE0; --line-soft:#E3E7EB;
  --ink:#1C2126; --ink-muted:#5C6670; --ink-faint:#8A939C;
  --accent:#A63D63; --accent-soft:#A63D6318; --on-accent:#FFFFFF;
  --ok:#1E8A50; --ok-soft:#1E8A5018; --warn:#B26E10; --warn-soft:#B26E1018;
  --err:#BC3F3F; --err-soft:#BC3F3F18;
  --shadow: 0 1px 2px rgba(15,20,25,.06), 0 2px 8px rgba(15,20,25,.05);
}
:root[data-theme="dark"] {
  --bg:#14171B; --surface:#1D2228; --surface-2:#242B33; --line:#313A44; --line-soft:#2A323B;
  --ink:#E6EAEE; --ink-muted:#97A2AD; --ink-faint:#6C7883;
  --accent:#D9678F; --accent-soft:#D9678F1E; --on-accent:#1A0E13;
  --ok:#46C280; --ok-soft:#46C2801E; --warn:#E0A248; --warn-soft:#E0A2481E;
  --err:#E56A6A; --err-soft:#E56A6A1E;
  --shadow: 0 1px 2px rgba(0,0,0,.35), 0 2px 10px rgba(0,0,0,.25);
}

/* ============================ base ============================ */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-ui);
  font-size: var(--fs-2);
  line-height: 1.45;
}
button { font: inherit; color: inherit; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; }
}

/* ============================ layout ============================ */
.app { display: flex; min-height: 100vh; }

.sidebar {
  width: 208px; flex: 0 0 208px;
  border-right: 1px solid var(--line);
  background: var(--surface);
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh;
}
.wordmark {
  display: flex; align-items: center; gap: 10px;
  padding: 16px 16px 14px;
  border-bottom: 1px solid var(--line-soft);
}
.wordmark .mark {
  width: 30px; height: 30px; border-radius: var(--r-sm);
  background: var(--accent); color: var(--on-accent);
  font-family: var(--font-mono); font-weight: 700; font-size: 1rem;
  display: grid; place-items: center;
}
.wordmark .name { font-weight: 650; letter-spacing: .01em; }
.wordmark .sub {
  font-family: var(--font-mono); font-size: var(--fs-0);
  color: var(--ink-muted); display: block; margin-top: 1px;
}
.nav { padding: 10px 8px; display: flex; flex-direction: column; gap: 2px; }
.nav button {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; text-align: left;
  padding: 8px 10px; border: 0; border-radius: var(--r-sm);
  background: transparent; color: var(--ink-muted);
  cursor: pointer;
}
.nav button:hover { background: var(--surface-2); color: var(--ink); }
.nav button.active {
  background: var(--accent-soft); color: var(--accent); font-weight: 600;
}
.sidebar .foot {
  margin-top: auto; padding: 12px 16px;
  border-top: 1px solid var(--line-soft);
  font-size: var(--fs-0); color: var(--ink-faint);
  font-family: var(--font-mono); line-height: 1.7;
}

/* the frame is the viewport and the content area scrolls inside it, so a page
   can hand its own height to a child that scrolls on its own (the log) */
.main { flex: 1; min-width: 0; display: flex; flex-direction: column; height: 100vh; }

.topbar {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  padding: 12px 24px;
  border-bottom: 1px solid var(--line);
  background: var(--surface);
  position: sticky; top: 0; z-index: 5;
}
.topbar h1 { font-size: var(--fs-4); font-weight: 650; margin: 0 auto 0 0; text-wrap: balance; }

.content { padding: 22px 24px 60px; max-width: 1160px; width: 100%; margin: 0 auto;
  flex: 1 1 auto; overflow-y: auto; display: flex; flex-direction: column; min-height: 0; }
.page { display: none; }
.page.active { display: block; }
.page > .lede { color: var(--ink-muted); max-width: 65ch; margin: 0 0 18px; }

/* ============================ primitives ============================ */
.pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 10px; border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--surface-2);
  font-family: var(--font-mono); font-size: var(--fs-0);
  color: var(--ink-muted); white-space: nowrap;
}
/* the topbar dots are indicator lamps: a lit one carries a hot core and
   throws a little glow, so lit and dark read apart at a glance */
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ink-faint); flex: 0 0 auto; }
.dot.ok, .dot.warn, .dot.err { box-shadow: 0 0 5px 1px currentColor; }
.dot.ok {
  color: var(--ok);
  background: radial-gradient(circle at 50% 32%, #FFFFFFC0 0%, var(--ok) 58%);
}
.dot.warn {
  color: var(--warn);
  background: radial-gradient(circle at 50% 32%, #FFFFFFC0 0%, var(--warn) 58%);
}
.dot.err {
  color: var(--err);
  background: radial-gradient(circle at 50% 32%, #FFFFFFC0 0%, var(--err) 58%);
}

.chip {
  display: inline-block; padding: 1px 8px; border-radius: 999px;
  font-size: var(--fs-0); font-weight: 600; letter-spacing: .04em;
  text-transform: uppercase; border: 1px solid transparent;
}
.chip.ok   { color: var(--ok);   background: var(--ok-soft); }
.chip.warn { color: var(--warn); background: var(--warn-soft); }
.chip.err  { color: var(--err);  background: var(--err-soft); }
.chip.off  { color: var(--ink-faint); background: var(--surface-2); }
.chip.out  { color: var(--ink-faint); background: transparent; border-color: var(--line); }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: var(--r-sm);
  border: 1px solid var(--line);
  background: var(--surface); color: var(--ink);
  cursor: pointer; font-size: var(--fs-1);
}
.btn:hover { border-color: var(--ink-faint); }
.btn:disabled { opacity: .4; cursor: default; }
.btn:disabled:hover { border-color: var(--line); filter: none; }
.btn.primary {
  background: var(--accent); border-color: var(--accent); color: var(--on-accent);
  font-weight: 600;
}
.btn.primary:hover { filter: brightness(1.06); }
.btn.small { padding: 3px 9px; font-size: var(--fs-0); }
/* an action that interrupts the running machine: red at rest, filled once
   armed. Both captions share one grid cell, so arming swaps the text without
   resizing the button. */
.btn.danger { border-color: var(--err); color: var(--err); }
.btn.danger:hover { border-color: var(--err); background: var(--err-soft); }
.btn.danger.armed { background: var(--err); border-color: var(--err); color: #fff; font-weight: 600; }
.btn.danger .lbl { display: grid; width: 100%; }
.btn.danger .lbl > span { grid-area: 1 / 1; text-align: center; }
.btn.danger .lbl .armed-lbl { visibility: hidden; }
.btn.danger.armed .lbl .idle { visibility: hidden; }
.btn.danger.armed .lbl .armed-lbl { visibility: visible; }

.card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  box-shadow: var(--shadow);
}
.card .card-head {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
}
.card .card-body { padding: 0 14px 14px; }
.card h3 { font-size: var(--fs-3); font-weight: 650; margin: 0; }

.grid { display: grid; gap: 14px; }
.grid.cols-2 { grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); }
.grid.cols-4 { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }

.mono { font-family: var(--font-mono); }
.muted { color: var(--ink-muted); }
.octal::before { content: "o"; color: var(--ink-faint); font-size: .85em; margin-right: 1px; }

/* toggle switch */
.toggle { position: relative; display: inline-block; width: 34px; height: 19px; flex: 0 0 auto; }
.toggle input { opacity: 0; width: 100%; height: 100%; margin: 0; cursor: pointer; position: absolute; z-index: 1; }
.toggle .slider {
  position: absolute; inset: 0; border-radius: 999px;
  background: var(--line); transition: background .15s;
}
.toggle .slider::before {
  content: ""; position: absolute; width: 13px; height: 13px; border-radius: 50%;
  left: 3px; top: 3px; background: var(--surface); transition: transform .15s;
  box-shadow: 0 1px 2px rgba(0,0,0,.25);
}
.toggle input:checked + .slider { background: var(--ok); }
.toggle input:checked + .slider::before { transform: translateX(15px); }
.toggle input:focus-visible + .slider { outline: 2px solid var(--accent); outline-offset: 2px; }

/* tables */
table.data { width: 100%; border-collapse: collapse; font-size: var(--fs-1); }
table.data th {
  text-align: left; font-size: var(--fs-0); text-transform: uppercase;
  letter-spacing: .05em; color: var(--ink-faint); font-weight: 600;
  padding: 8px 10px; border-bottom: 1px solid var(--line);
}
table.data td {
  padding: 7px 10px; border-bottom: 1px solid var(--line-soft);
  font-variant-numeric: tabular-nums;
}
table.data tr:last-child td { border-bottom: 0; }
table.data td.mono, table.data th.num { font-family: var(--font-mono); }
.table-wrap { overflow-x: auto; }

/* ============================ dashboard ============================ */
.tile {
  padding: 14px; min-height: 104px;
  display: flex; flex-direction: column; gap: 8px;
  align-items: center; text-align: center;
}
.tile .t-body {
  flex: 1; display: flex; flex-direction: column; gap: 4px;
  align-items: center; justify-content: center;
}
.tile .k {
  font-size: var(--fs-0); text-transform: uppercase; letter-spacing: .06em;
  color: var(--ink-faint); font-weight: 600;
}
.tile .v { font-size: 1.25rem; font-weight: 650; font-family: var(--font-mono); }
.tile .s { font-size: var(--fs-1); color: var(--ink-muted); }
.tile .chips { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }
.tile .chips .chip { font-family: var(--font-mono); text-transform: none; letter-spacing: 0; }

.ledrow { display: flex; gap: 14px; align-items: center; }
.led {
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--lamp-off);
  box-shadow: inset 0 1px 2px rgba(0,0,0,.4);
}
/* lit lamp: hot core inside the lens, with the glow it throws on the panel */
.led.on {
  background: radial-gradient(circle at 50% 38%,
              var(--lamp-red-hot) 0%, var(--lamp-red) 62%, var(--lamp-red-deep) 100%);
  box-shadow: 0 0 4px 1px rgba(255, 59, 34, .45),
              0 0 9px 2px rgba(255, 59, 34, .18);
}
.led-label { font-family: var(--font-mono); font-size: var(--fs-0); color: var(--ink-muted); }

.dipsw { display: flex; gap: 8px; }
.dip {
  width: 18px; height: 34px; border-radius: 3px;
  background: var(--bezel); position: relative;
  border: 1px solid var(--bezel-2);
}
.dip::after {
  content: ""; position: absolute; left: 3px; right: 3px; height: 12px;
  border-radius: 2px; background: var(--ink-faint); top: 17px;
}
.dip.on::after { top: 4px; background: var(--phosphor-dim); }

/* dashboard layout: control + front panel left, terminal right, widgets below */
.dash-top { display: flex; gap: 14px; align-items: stretch; flex-wrap: wrap; }
.dash-left { display: flex; flex-direction: column; gap: 14px; width: 260px; flex: 0 0 auto; }
.dash-left .ctrl-card { flex: 0 0 auto; }
.dash-left .frontpanel { flex: 1 1 auto; }
.ctrl-btns { display: flex; flex-direction: column; gap: 8px; }
.ctrl-btns > .btn { width: 100%; justify-content: center; }
.dash-term { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; align-items: flex-start; }
/* the three rows share the card's height evenly, and each row's controls
   spread across the width the legend column leaves them */
.frontpanel { display: flex; flex-direction: column; }
/* the head's own padding would otherwise widen the gap above the first row */
.frontpanel .card-head { padding-bottom: 0; }
.frontpanel .card-body {
  flex: 1 1 auto; padding-bottom: 0;
  display: flex; flex-direction: column; justify-content: space-evenly;
}
.frontpanel .fp-row { display: flex; align-items: center; gap: 10px; }
.frontpanel .fp-row .chip { flex: 1 1 0; text-align: center; white-space: nowrap; }
/* lamps and switches keep their own spacing and read as one block, the way
   they sit on a real panel */
.frontpanel .fp-k {
  font-size: var(--fs-0); text-transform: uppercase; letter-spacing: .05em;
  color: var(--ink-faint); font-weight: 600; width: 38px; flex: 0 0 auto;
}
.term-tabs #serial-bar { align-items: center; gap: 6px; margin-left: auto; }

/* ============================ devices ============================ */
.dev-card { margin-bottom: 14px; }
.dev-head { cursor: pointer; user-select: none; }
.dev-head .devname { font-family: var(--font-mono); font-weight: 700; font-size: var(--fs-3); }
.dev-head .devtype { color: var(--ink-muted); font-size: var(--fs-1); }
.dev-head .addr { margin-left: auto; }
.dev-sub {
  border-top: 1px solid var(--line-soft);
  padding: 10px 14px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.dev-sub .devname { font-family: var(--font-mono); font-weight: 600; }
.dev-sub .imgpath { font-family: var(--font-mono); font-size: var(--fs-1); color: var(--ink-muted); }
.dev-sub .spacer { margin-left: auto; }
.act-led {
  width: 9px; height: 9px; border-radius: 50%; background: var(--lamp-off); flex: 0 0 auto;
}
.act-led.on { background: var(--warn); box-shadow: 0 0 5px var(--warn); }

.params { border-top: 1px solid var(--line-soft); padding: 10px 14px 14px; }
.params .p-grid {
  display: grid; grid-template-columns: 150px 1fr; gap: 6px 14px; align-items: center;
}
.params .p-name { font-family: var(--font-mono); font-size: var(--fs-1); }
.params .p-name .p-short { color: var(--ink-faint); }
.params .p-val { display: flex; align-items: center; gap: 8px; }
.params input[type="text"], .params input[type="number"], .params select {
  font-family: var(--font-mono); font-size: var(--fs-1);
  padding: 4px 8px; border-radius: var(--r-sm);
  border: 1px solid var(--line); background: var(--surface-2); color: var(--ink);
  width: 100%; max-width: 340px;
}
.params .ro {
  font-family: var(--font-mono); font-size: var(--fs-1); color: var(--ink-muted);
}
.params .unit { font-size: var(--fs-0); color: var(--ink-faint); }
.params .p-info { font-size: var(--fs-0); color: var(--ink-faint); grid-column: 2; margin-top: -4px; }

/* ============================ machine settings ============================ */
.set-grid { display: grid; grid-template-columns: 130px 1fr; gap: 4px 16px; align-items: center; }
.set-name { font-weight: 600; font-size: var(--fs-1); }
.set-val { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.set-val select {
  font-family: var(--font-mono); font-size: var(--fs-1);
  padding: 4px 8px; border-radius: var(--r-sm);
  border: 1px solid var(--line); background: var(--surface-2); color: var(--ink);
}
.set-info { grid-column: 2; font-size: var(--fs-0); color: var(--ink-faint); margin: -2px 0 12px; }
.set-val .radio { display: inline-flex; align-items: center; gap: 5px; font-size: var(--fs-1); cursor: pointer; }
.set-val .radio input { margin: 0; }

/* ============================ console ============================ */
/* the tab set depends on which devices are enabled, so keep the bar blank
   until the live model has been read - otherwise the wrong tabs flash up.
   It stays laid out (visibility, not display) so the terminal does not jump
   down once the tabs appear. */
.term-tabs { display: flex; gap: 6px; margin-bottom: 10px; visibility: hidden; }
.term-tabs.ready { visibility: visible; }
.term-tabs button {
  padding: 5px 12px; border-radius: var(--r-sm) var(--r-sm) 0 0;
  border: 1px solid var(--line); border-bottom: 0;
  background: var(--surface-2); color: var(--ink-muted);
  font-family: var(--font-mono); font-size: var(--fs-1); cursor: pointer;
}
.term-tabs button.active { background: var(--term-bg); color: var(--phosphor); border-color: var(--term-bg); }
.term-tabs button:disabled { opacity: .45; cursor: default; }
/* the serial controls sit in the tab bar but are not tabs */
.term-tabs #serial-bar select {
  font-family: var(--font-mono); font-size: var(--fs-1);
  padding: 3px 6px; border-radius: var(--r-sm);
  border: 1px solid var(--line); background: var(--surface-2); color: var(--ink);
}
.term-tabs #serial-bar button {
  border: 1px solid var(--line); border-radius: var(--r-sm);
}
/* 80×24 VT100 terminal: fixed character grid, remote echo only.
   min-width/height reserve the 80×24 box so the panel does not grow when
   xterm.js fills it on connect */
.term {
  background: var(--term-bg); color: var(--phosphor);
  font-family: var(--font-mono); font-size: 13px; line-height: 1.3;
  border-radius: 0 var(--r-md) var(--r-md) var(--r-md);
  padding: 12px 14px; width: max-content; max-width: 100%;
  min-width: 703px; min-height: 432px;
  overflow-x: auto; white-space: pre; cursor: text;
}
.term:focus { outline: 2px solid var(--accent); outline-offset: 2px; }
.term .tcur { background: var(--phosphor); color: var(--term-bg); }
@media (prefers-reduced-motion: no-preference) {
  .term:focus .tcur { animation: blink 1.1s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
}

/* ============================ storage ============================ */
.dropzone {
  border: 2px dashed var(--line); border-radius: var(--r-md);
  padding: 22px; text-align: center; color: var(--ink-muted);
  margin-bottom: 16px; cursor: pointer; background: var(--surface);
}
.dropzone:hover { border-color: var(--accent); color: var(--accent); }

/* ============================ configurations ============================ */
.cfg-row { margin-bottom: 12px; }
.cfg-row .card-head { flex-wrap: wrap; }
/* the devices a configuration names, in the devices page's own language */
.cfg-devs .dev-sub { border-top: 1px solid var(--line-soft); }
.cfg-devs .params { padding-top: 0; }

/* ============================ diagnostics ============================ */
.logbox { font-family: var(--font-mono); font-size: var(--fs-1); overflow-y: auto; }
/* the log page is the log: its card fills the content area and only the
   entries inside it scroll */
.page[data-page="log"].active { display: flex; flex-direction: column; flex: 1 1 auto; min-height: 0; }
.logcard { flex: 1 1 auto; display: flex; flex-direction: column; min-height: 0; }
.logcard .card-head { padding-bottom: 0; }
.logcard .logbox { flex: 1 1 auto; min-height: 0; }
.content:has(.page[data-page="log"].active) { padding-bottom: 22px; }
.filter-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.filter-row .chip { cursor: pointer; border: 1px solid transparent; }
.filter-row .chip.inactive { opacity: .35; }

/* ============================ virtual panel ============================ */
.rlpanel-row { display: grid; gap: 16px; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); }
.rlpanel {
  background: var(--rl-panel); border-radius: var(--r-md);
  padding: 16px; color: var(--rl-ink);
  border: 1px solid var(--rl-panel-edge);
  box-shadow: var(--shadow);
  display: flex; flex-direction: column; height: 100%;
}
.rlpanel .plabel {
  font-family: var(--font-mono); font-size: var(--fs-0);
  letter-spacing: .12em; margin-bottom: 12px; color: var(--rl-ink-dim);
  display: flex; justify-content: space-between;
}
/* the caps sit in a black bezel that hugs the button bar, as on the drive:
   one row, as the switch plate is on the real machine */
.lamps {
  display: inline-flex; gap: 5px; flex-wrap: nowrap;
  align-self: flex-start; /* the bezel hugs its caps, not the panel width */
  background: #17150E; padding: 5px; border-radius: 4px;
  box-shadow: inset 0 1px 4px rgba(0, 0, 0, .6);
}
/* Switch caps come in two sizes: the small square every legend uses, and the
   wide cap the RA81 READY needs for its unit number beside the legend.
   Colored caps, black legends, incandescent glow when lit. */
.lampbtn {
  flex: 0 0 auto; width: 50px; min-height: 44px;
  border: 0; border-radius: 3px;
  color: #17150E;
  font-family: var(--font-mono); font-size: var(--fs-0); font-weight: 700;
  padding: 8px 2px; text-align: center; cursor: pointer;
  letter-spacing: .04em; line-height: 1.2;
  transition: background .2s, box-shadow .2s;
}
.lampbtn.wide {
  width: 104px;
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
}
.lampbtn:disabled { cursor: default; }
/* a cap whose whole legend is the drive's port letter carries it large */
.lampbtn.legend-lg { font-size: 1.35rem; letter-spacing: 0; }
.lampbtn .num { display: block; font-size: 1.05rem; font-weight: 800; line-height: 1.1; }
/* the unit number is set large in a thin engraved frame, the legend beside it
   staying small */
.lampbtn.wide .num {
  border: 1px solid rgba(23, 21, 14, .7); border-radius: 1px;
  padding: 3px 11px; font-size: 1.35rem; font-weight: 800; line-height: 1;
}
.lampbtn.wide .rdy { font-size: var(--fs-0); letter-spacing: .06em; }
.lampbtn.cap-yellow      { background: #93803A; }
.lampbtn.cap-yellow.lit  { background: #F7CE3B; box-shadow: 0 0 12px #F7CE3B88; }
.lampbtn.cap-white       { background: #BDB9AE; }
.lampbtn.cap-white.lit   { background: #FFEED2; box-shadow: 0 0 12px #FFD99A88; }
.lampbtn.cap-red         { background: #8C312A; }
.lampbtn.cap-red.lit     { background: #EF4B3D; box-shadow: 0 0 12px #EF4B3D88; }
.lampbtn.cap-orange      { background: #93803A; }
.lampbtn.cap-orange.lit  { background: #F7A427; box-shadow: 0 0 12px #F7A42788; }

/* ============================ device widgets ============================ */
/* the column is wide enough for a four-cap switch plate in one row */
.widget-grid { display: grid; gap: 14px; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); align-items: start; }
/* each widget stands at its own height; a short panel beside a tall one (the
   VCB01 screen) sizes to its own content rather than stretching to the row */
.widget-grid .rlpanel { height: auto; }
/* a panel whose bezel needs the room takes two columns */
.rlpanel.span2 { grid-column: span 2; }
/* the VCB01 shows its framebuffer; give it the room and keep pixels crisp */
.vcb01-widget { grid-column: span 2; }
.vcb01-screen { margin-top: 8px; background: var(--term-bg); border: 1px solid var(--line); border-radius: 3px; overflow: hidden; }
.vcb01-screen canvas { display: block; width: 100%; height: auto; image-rendering: pixelated; background: var(--term-bg); cursor: crosshair; outline: none; }
.vcb01-screen canvas:focus { box-shadow: inset 0 0 0 2px var(--phosphor); }
.vcb01-hint { font-size: var(--fs-1); color: var(--ink-muted); margin-top: 4px; }

/* removable-media tags */
.w-tag { font-size: var(--fs-0); padding: 1px 7px; border-radius: 999px; white-space: nowrap; }
.w-tag.fixed    { color: var(--ink-faint); background: var(--surface-2); }
.w-tag.locked   { color: var(--warn); background: var(--warn-soft); }
.w-tag.unlocked { color: var(--ok);   background: var(--ok-soft); }
.rlpanel .rl-foot { display: flex; align-items: center; gap: 8px; margin-top: auto;
  padding-top: 12px; flex-wrap: wrap; }
/* device facts that are text rather than a medium */
.rl-info {
  flex: 1 1 auto; min-width: 0; padding: 5px 8px; border-radius: var(--r-sm);
  font-family: var(--font-mono); font-size: var(--fs-0); color: var(--rl-ink);
  background: var(--rl-inset); border: 1px solid var(--rl-panel-edge);
  line-height: 1.6; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.rl-img {
  flex: 1 1 auto; min-width: 0; max-width: 260px; padding: 5px 8px; border-radius: var(--r-sm);
  font-size: var(--fs-0); color: var(--rl-ink); background: var(--rl-inset);
  border: 1px solid var(--rl-panel-edge);
  text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
button.rl-img.swap { cursor: pointer; }
button.rl-img.swap:hover { border-color: var(--accent); color: var(--accent); }

/* image-picker modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(10,14,18,.5); display: flex; align-items: center; justify-content: center; z-index: 60; }
/* carries .card as well, for the shared surface/head/h3 styling */
.modal-card {
  width: 420px; max-width: calc(100vw - 32px);
  max-height: calc(100vh - 64px); display: flex; flex-direction: column;
}
.modal-close {
  margin-left: auto; flex: 0 0 auto;
  display: grid; place-items: center; width: 26px; height: 26px; padding: 0;
  border: 0; border-radius: var(--r-sm); background: transparent;
  color: var(--ink-faint); font-size: 1.3rem; line-height: 1; cursor: pointer;
}
.modal-close:hover { background: var(--surface-2); color: var(--ink); }
.modal-card .pick-list { overflow-y: auto; padding: 4px 14px 14px; }
.pick-row {
  display: flex; align-items: center; gap: 10px; width: 100%; text-align: left;
  padding: 8px 10px; margin-bottom: 6px; cursor: pointer;
  border: 1px solid var(--line-soft); border-radius: var(--r-sm);
  background: var(--surface); color: var(--ink);
}
.pick-row:hover { border-color: var(--accent); background: var(--surface-2); }
.pick-row .mono:first-child { flex: 1; }
/* the medium the drive holds now, so the list opens on a known position */
.pick-row.current { border-color: var(--accent); background: var(--surface-2); }

/* the image parameter is chosen, not typed: a field that opens the picker */
.imgfield {
  font-size: var(--fs-1); text-align: left; cursor: pointer;
  padding: 4px 8px; border: 1px solid var(--line); border-radius: var(--r-sm);
  background: var(--surface); color: var(--ink); min-width: 16ch;
}
.imgfield:hover { border-color: var(--accent); background: var(--surface-2); }

/* ============================ toasts ============================ */
.toast-host {
  position: fixed; right: 18px; bottom: 18px; z-index: 50;
  display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
}
.toast {
  background: var(--surface); border: 1px solid var(--line);
  border-left: 3px solid var(--accent);
  border-radius: var(--r-sm); box-shadow: var(--shadow);
  padding: 9px 14px; max-width: 380px;
}
.toast .cmd { font-family: var(--font-mono); font-size: var(--fs-1); color: var(--accent); }
.toast .msg { font-size: var(--fs-1); color: var(--ink-muted); margin-top: 1px; }
@media (prefers-reduced-motion: no-preference) {
  .toast { animation: rise .18s ease-out; }
  @keyframes rise { from { opacity: 0; transform: translateY(6px); } }
}

@media (max-width: 760px) {
  .app { flex-direction: column; }
  .sidebar { width: 100%; flex: none; height: auto; position: static; }
  .nav { flex-direction: row; flex-wrap: wrap; }
  .sidebar .foot { display: none; }
  /* stacked: the page scrolls as a whole again */
  .main { height: auto; }
  .content { overflow-y: visible; }
  .page[data-page="log"].active { display: block; }
  .logcard .logbox { max-height: 70vh; }
}
</style>
</head>
<body>

<div id="app"></div>
<div class="toast-host" id="toasts"></div>

<script type="module">
import { html, render, Component, createContext } from './vendor/preact-standalone.js';
import { useState, useEffect, useRef, useContext, useCallback } from './vendor/preact-standalone.js';

/* ============================================================
   QBone web interface — Preact + htm, no build step.

   The declarative UI (sidebar, topbar, pages, device list, widgets)
   is Preact. The imperative browser APIs it drives — xterm.js
   terminals, Web Serial, the WebSocket streams, the promise-based
   modals and the toasts — stay as plain modules and are wired to
   the component tree through a small shared store.
   ============================================================ */

/* ---------------- shared store ----------------
   One mutable object plus a listener set. Components read it through
   useStore() and re-render when any field changes. High-frequency lamp
   events are coalesced with a short timer so a busy device does not
   thrash the whole tree. */
const store = {
  devmodel: [], settings: { platform: '', address_width: 22,
      external_console: { source: 'webserial', port: 'ttyS2', baud: 38400 } },
  images: [], imagesDir: '', configs: null, platform: '',
  connected: false, page: 'dashboard',
  bus: { halted: false, init: false },
  hw: { dcok: true, pok: true, leds: [false,false,false,false], dip: [false,false,false,false] },
  log: [], activeLevels: new Set(['ERROR','WARNING','INFO']),
  termReady: false, activeTerm: 'slu0',
  listeners: new Set(),
};
let emitPending = false;
function emit() {
  if (emitPending) return;
  emitPending = true;
  queueMicrotask(() => { emitPending = false; store.listeners.forEach(l => l()); });
}
function setStore(patch) { Object.assign(store, patch); emit(); }
let widgetEmitPending = false;
function emitSoon() { /* coalesce lamp storms */
  if (widgetEmitPending) return;
  widgetEmitPending = true;
  setTimeout(() => { widgetEmitPending = false; store.listeners.forEach(l => l()); }, 150);
}
function useStore() {
  const [, force] = useState(0);
  useEffect(() => {
    const l = () => force(x => x + 1);
    store.listeners.add(l);
    return () => store.listeners.delete(l);
  }, []);
  return store;
}

/* ---------------- small helpers ---------------- */
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function octalStr(v, bitwidth) { return v.toString(8).padStart(Math.ceil((bitwidth || 16) / 3), '0'); }
function humanSize(n) {
  if (n >= 1048576) return (n / 1048576).toFixed(1) + ' MB';
  if (n >= 1024) return (n / 1024).toFixed(1) + ' KB';
  return n + ' B';
}
function imageLabel(path) {
  if (!path) return '';
  const pfx = store.imagesDir + '/';
  if (store.imagesDir && path.startsWith(pfx)) {
    const rest = path.slice(pfx.length);
    if (rest.indexOf('/') === -1) return rest;
  }
  return path;
}
const wsURL = p => (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + p;

/* ---------------- toasts (imperative overlay) ---------------- */
function toast(cmd, msg) {
  const host = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = (cmd ? '<div class="cmd">&gt; ' + esc(cmd) + '</div>' : '') +
                 (msg ? '<div class="msg">' + esc(msg) + '</div>' : '');
  host.appendChild(el);
  setTimeout(() => el.remove(), 3600);
}

/* ---------------- live model from /api/devices ---------------- */
function liveParam(p) {
  const out = { n: p.name, s: p.shortname, ro: p.readonly, i: p.info || '', u: p.unit || '' };
  if (p.type === 'unsigned' || p.type === 'unsigned64') {
    if (p.base === 8) { out.t = 'oct'; out.v = octalStr(p.value, p.bitwidth); out.bw = p.bitwidth; }
    else { out.t = 'uint'; out.v = String(p.value); }
  } else if (p.type === 'double') { out.t = 'dbl'; out.v = String(p.value); }
  else if (p.type === 'bool') { out.t = 'str'; out.v = p.value ? '1' : '0'; }
  else if (p.type === 'enum') { out.t = 'enum'; out.v = p.value == null ? '' : String(p.value); out.opts = p.values || p.options || []; }
  else { out.t = 'str'; out.v = p.value == null ? '' : String(p.value); }
  return out;
}
function liveModel(devs) {
  const hidden = ['name', 'type', 'enabled'];
  const map = new Map(devs.map(d => [d.name, {
    name: d.name, type: d.type, category: d.category, enabled: d.enabled,
    removable: d.removable, locked: d.locked, info: '',
    params: d.params.filter(p => !hidden.includes(p.name)).map(liveParam),
    drives: [],
    img: String((d.params.find(p => p.name === 'image') || {}).value || ''),
  }]));
  const roots = [];
  devs.forEach(d => {
    const e = map.get(d.name);
    if (d.parent && map.has(d.parent)) map.get(d.parent).drives.push(e);
    else roots.push(e);
  });
  return roots;
}
function walkDevs(fn, list = store.devmodel) { list.forEach(d => { fn(d); walkDevs(fn, d.drives || []); }); }
function enabledDevices() { const out = []; walkDevs(d => { if (d.enabled) out.push(d); }); return out; }
function devEnabled(name) { let f = false; walkDevs(d => { if (d.name === name && d.enabled) f = true; }); return f; }

/* ---------------- API ---------------- */
async function apiJSON(url, opts) {
  const r = await fetch(url, opts);
  const data = await r.json().catch(() => ({}));
  return { ok: r.ok, data };
}
async function apiSetParam(dev, param, value) {
  return apiJSON('/api/devices/' + encodeURIComponent(dev) + '/params/' + encodeURIComponent(param), {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ value: String(value) }) });
}
async function refreshDevices() {
  const r = await fetch('/api/devices');
  if (!r.ok) throw new Error('devices fetch failed');
  setStore({ devmodel: liveModel(await r.json()) });
  replayEventValues();
  emit();
}
async function liveSetParam(dev, param, value, okMsg) {
  const res = await apiSetParam(dev, param, value);
  toast(dev + '.' + param + ' = ' + (value === '' ? '""' : value),
        res.ok ? okMsg : (res.data.error || 'rejected'));
  refreshDevices().catch(() => {});
}
async function liveControl(action, okMsg) {
  const res = await apiJSON('/api/control', { method: 'POST',
    headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action }) });
  toast('control: ' + action, res.ok ? okMsg : (res.data.error || 'rejected'));
}
async function refreshSettings() {
  const r = await fetch('/api/settings');
  if (!r.ok) throw new Error('settings fetch failed');
  setStore({ settings: await r.json() });
  updateConsoleSource();
}
async function putSettings(patch, okMsg) {
  const res = await apiJSON('/api/settings', { method: 'PUT',
    headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(patch) });
  const warns = (res.data.warnings || []).join('; ');
  toast('PUT /api/settings', warns || (res.ok ? okMsg : (res.data.error || 'rejected')));
  await refreshSettings().catch(() => {});
  return res;
}
async function refreshImages() {
  const r = await fetch('/api/images');
  if (!r.ok) throw new Error('images fetch failed');
  setStore({ images: await r.json() });
}

/* ---------------- live events: /ws/events ---------------- */
const EVENT_VALUES = new Map();
function applyParamValue(dev, name, value) {
  walkDevs(d => {
    if (d.name === dev) {
      if (name === 'enabled') d.enabled = !!value;
      if (name === 'image') d.img = String(value || '');
      const p = d.params.find(q => q.n === name);
      if (p) {
        if (p.t === 'oct') p.v = octalStr(value, p.bw);
        else if (typeof value === 'boolean') p.v = value ? '1' : '0';
        else p.v = value == null ? '' : String(value);
      }
    }
  });
}
function patchParam(dev, name, value) { EVENT_VALUES.set(dev + '\0' + name, value); applyParamValue(dev, name, value); }
function replayEventValues() {
  EVENT_VALUES.forEach((value, key) => {
    const sep = key.indexOf('\0');
    applyParamValue(key.slice(0, sep), key.slice(sep + 1), value);
  });
}
const LOG_LEVELS = { 1: 'FATAL', 2: 'ERROR', 3: 'WARNING', 4: 'INFO', 5: 'DEBUG' };
let eventsWs = null;
function initEvents() {
  eventsWs = new WebSocket(wsURL('/ws/events'));
  eventsWs.onopen = () => setStore({ connected: true });
  eventsWs.onmessage = e => {
    let ev; try { ev = JSON.parse(e.data); } catch (_) { return; }
    if (ev.t === 'param') {
      patchParam(ev.dev, ev.param, ev.value);
      if (/lamp$/.test(ev.param)) emitSoon(); else emit();
    } else if (ev.t === 'log') {
      store.log.push({ t: new Date().toTimeString().slice(0, 8),
        lvl: LOG_LEVELS[ev.level] || 'INFO', src: ev.label,
        msg: ev.text.replace(/^\[[^\]]*\]\s*/, '') });
      if (store.log.length > 500) store.log.shift();
      emit();
    } else if (ev.t === 'state') {
      const hw = store.hw, bus = store.bus;
      if ('halt' in ev) bus.halted = ev.halt;
      if ('init' in ev) bus.init = ev.init;
      if ('dcok' in ev) hw.dcok = ev.dcok;
      if ('pok' in ev) hw.pok = ev.pok;
      if (ev.leds) ev.leds.forEach((v, i) => hw.leds[i] = v);
      if (ev.switches) ev.switches.forEach((v, i) => hw.dip[i] = v);
      emit();
    }
  };
  eventsWs.onclose = () => { setStore({ connected: false }); setTimeout(initEvents, 2000); };
}

/* ---------------- terminals: xterm.js + Web Serial ----------------
   Three xterm instances live in module state and are appended into the
   dashboard terminal host once it mounts; tabs toggle their display. */
const COLS = 80, ROWS = 24;
let TERMS = null, termHostEl = null, extWs = null;
let serialPort = null, serialWriter = null, serialReader = null;
const serialEncoder = new TextEncoder();

function makeTermInstance() {
  const cs = getComputedStyle(document.documentElement);
  const phosphor = cs.getPropertyValue('--phosphor').trim() || '#7CE38B';
  const el = document.createElement('div');
  el.style.display = 'none';
  termHostEl.appendChild(el);
  const term = new Terminal({
    cols: COLS, rows: ROWS, cursorBlink: true, scrollback: 1000,
    fontFamily: cs.getPropertyValue('--font-mono').trim() || 'monospace', fontSize: 14,
    theme: { background: cs.getPropertyValue('--term-bg').trim() || '#0B100C',
             foreground: phosphor, cursor: phosphor } });
  term.open(el);
  return { el, term };
}
function initLiveTerminal(host) {
  if (TERMS || typeof Terminal === 'undefined') return;
  termHostEl = host;
  termHostEl.innerHTML = '';
  TERMS = { slu0: makeTermInstance(), slu1: makeTermInstance(), serial: makeTermInstance() };
  wireConsole('slu0', 0); wireConsole('slu1', 1); wireSerial();
  setStore({ termReady: true });
  // the default tab is an SLU that may be disabled; fall back to the console
  const en0 = devEnabled('DL11'), en1 = devEnabled('DL11b');
  const start = (store.activeTerm === 'slu0' && !en0) || (store.activeTerm === 'slu1' && !en1)
    ? (en0 ? 'slu0' : en1 ? 'slu1' : 'serial') : store.activeTerm;
  liveTab(start);
  updateConsoleSource();
}
function wireConsole(key, n) {
  const t = TERMS[key];
  t.term.onData(d => { if (t.ws && t.ws.readyState === WebSocket.OPEN) t.ws.send(d); });
  (function connect() {
    t.ws = new WebSocket(wsURL('/ws/console/' + n));
    t.ws.binaryType = 'arraybuffer';
    t.ws.onmessage = e => t.term.write(new Uint8Array(e.data));
    t.ws.onclose = () => setTimeout(connect, 2000);
  })();
}
function liveTab(key) {
  store.activeTerm = key;
  for (const k of Object.keys(TERMS)) TERMS[k].el.style.display = k === key ? '' : 'none';
  TERMS[key].term.focus();
  emit();
}
function extConsoleDisconnectWs() { if (extWs) { try { extWs.close(); } catch (e) {} extWs = null; } }
function wireExtConsoleWs() {
  const t = TERMS.serial;
  extConsoleDisconnectWs();
  (function connect() {
    if ((store.settings.external_console || {}).source !== 'ttys2') return;
    extWs = new WebSocket(wsURL('/ws/console/ext'));
    extWs.binaryType = 'arraybuffer';
    extWs.onmessage = e => t.term.write(new Uint8Array(e.data));
    extWs.onclose = () => { extWs = null;
      if ((store.settings.external_console || {}).source === 'ttys2') setTimeout(connect, 2000); };
  })();
}
function updateConsoleSource() {
  if (!TERMS) return;
  const src = (store.settings.external_console || {}).source || 'off';
  if (serialPort) serialDisconnect();
  extConsoleDisconnectWs();
  if (src === 'ttys2') wireExtConsoleWs();
  emit();
}
async function serialConnect(baudRate) {
  const t = TERMS.serial;
  let port;
  try { port = await navigator.serial.requestPort(); await port.open({ baudRate }); }
  catch (e) { if (e.name !== 'NotFoundError') toast('serial', 'cannot open port: ' + e.message); return; }
  serialPort = port; serialWriter = port.writable.getWriter();
  localStorage.setItem('webserial.baud', String(baudRate));
  emit(); toast('serial', 'connected at ' + baudRate + ' baud');
  try {
    while (port.readable) {
      serialReader = port.readable.getReader();
      try { while (true) { const { value, done } = await serialReader.read();
        if (done) break; if (value) t.term.write(value); } }
      finally { serialReader.releaseLock(); serialReader = null; }
    }
  } catch (e) { toast('serial', 'read error: ' + e.message); }
  await serialDisconnect();
}
async function serialDisconnect() {
  if (!serialPort) return;
  const port = serialPort; serialPort = null;
  try { if (serialReader) await serialReader.cancel(); } catch (e) {}
  try { if (serialWriter) { serialWriter.releaseLock(); serialWriter = null; } } catch (e) {}
  try { await port.close(); } catch (e) {}
  emit(); toast('serial', 'disconnected');
}
function wireSerial() {
  const t = TERMS.serial;
  t.term.onData(d => {
    if ((store.settings.external_console || {}).source === 'ttys2') {
      if (extWs && extWs.readyState === WebSocket.OPEN) extWs.send(d);
    } else if (serialWriter) serialWriter.write(serialEncoder.encode(d));
  });
  if ('serial' in navigator)
    navigator.serial.addEventListener('disconnect', e => {
      if (serialPort && e.target === serialPort) serialDisconnect(); });
}

/* ---------------- VCB01 framebuffer: /ws/vcb01 ---------------- */
const VCB01D = { ws: null, off: null, w: 0, h: 0 };
function vcb01Off() { if (!VCB01D.off) VCB01D.off = document.createElement('canvas'); return VCB01D.off; }
// the picture wears the terminal's phosphor: lit pixels in --phosphor on the
// --term-bg ground, so the screen and the console read as one CRT
const VCB01_INK = (() => {
  const cs = getComputedStyle(document.documentElement);
  const rgb = (name, dflt) => {
    const h = (cs.getPropertyValue(name).trim() || dflt).replace('#', '');
    return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)];
  };
  return { on: rgb('--phosphor', '3DF57F'), off: rgb('--term-bg', '0B100C') };
})();
function vcb01DrawRows(first, count, bytes, boff) {
  const w = VCB01D.w, stride = w >> 3;
  const [onR, onG, onB] = VCB01_INK.on, [offR, offG, offB] = VCB01_INK.off;
  const ctx = vcb01Off().getContext('2d');
  const img = ctx.createImageData(w, count), d = img.data;
  for (let r = 0; r < count; r++)
    for (let x = 0; x < w; x++) {
      const on = (bytes[boff + r * stride + (x >> 3)] >> (7 - (x & 7))) & 1;
      const p = (r * w + x) * 4;
      d[p] = on ? onR : offR; d[p + 1] = on ? onG : offG; d[p + 2] = on ? onB : offB; d[p + 3] = 255;
    }
  ctx.putImageData(img, 0, first);
}
function vcb01Blit() {
  const cv = document.getElementById('vcb01-canvas');
  if (!cv || !VCB01D.w) return;
  if (cv.width !== VCB01D.w || cv.height !== VCB01D.h) { cv.width = VCB01D.w; cv.height = VCB01D.h; }
  cv.getContext('2d').drawImage(VCB01D.off, 0, 0);
}
function vcb01Connect() {
  if (VCB01D.ws && VCB01D.ws.readyState <= WebSocket.OPEN) return;
  const ws = new WebSocket(wsURL('/ws/vcb01'));
  ws.binaryType = 'arraybuffer';
  ws.onmessage = ev => {
    const b = new Uint8Array(ev.data);
    if (b[0] === 1) { VCB01D.w = (b[1] << 8) | b[2]; VCB01D.h = (b[3] << 8) | b[4];
      vcb01Off().width = VCB01D.w; vcb01Off().height = VCB01D.h; vcb01DrawRows(0, VCB01D.h, b, 5); }
    else if (b[0] === 2 && VCB01D.w) vcb01DrawRows((b[1] << 8) | b[2], (b[3] << 8) | b[4], b, 5);
    else return;
    vcb01Blit();
  };
  // a reaped or dropped socket would otherwise freeze the screen; reconnect
  // while the widget is still on the page (the server closes idle duplicates)
  ws.onclose = () => { VCB01D.ws = null;
    if (document.getElementById('vcb01-canvas')) setTimeout(vcb01Connect, 1500); };
  VCB01D.ws = ws;
}
function vcb01Disconnect() { if (VCB01D.ws) { const w = VCB01D.ws; VCB01D.ws = null; w.onclose = null; w.close(); } }
const VCB01_KEYSYM = (() => {
  const m = {};
  for (let c = 65; c <= 90; c++) m['Key' + String.fromCharCode(c)] = c + 32;
  for (let n = 0; n <= 9; n++) m['Digit' + n] = 0x30 + n;
  Object.assign(m, {
    Space: 0x20, Enter: 0xFF0D, Tab: 0xFF09, Backspace: 0xFF08, Delete: 0xFFFF,
    Semicolon: 0x3B, Equal: 0x3D, Comma: 0x2C, Minus: 0x2D, Period: 0x2E, Slash: 0x2F,
    Quote: 0x27, BracketLeft: 0x5B, BracketRight: 0x5D, Backslash: 0x5C, Backquote: 0x60,
    ShiftLeft: 0xFFE1, ShiftRight: 0xFFE2, ControlLeft: 0xFFE3, ControlRight: 0xFFE4,
    CapsLock: 0xFFE5, ArrowLeft: 0xFF51, ArrowUp: 0xFF52, ArrowRight: 0xFF53, ArrowDown: 0xFF54 });
  return m;
})();
function vcb01Send(bytes) { const ws = VCB01D.ws; if (ws && ws.readyState === WebSocket.OPEN) ws.send(new Uint8Array(bytes)); }
let vcb01KbdWired = false;
function vcb01WireKeyboard() {
  if (vcb01KbdWired) return; vcb01KbdWired = true;
  const key = (e, down) => {
    const cv = document.getElementById('vcb01-canvas');
    if (!cv || document.activeElement !== cv) return;
    const ks = VCB01_KEYSYM[e.code]; if (!ks) return;
    e.preventDefault();
    vcb01Send([0x10, down ? 1 : 0, (ks >>> 24) & 255, (ks >> 16) & 255, (ks >> 8) & 255, ks & 255]);
  };
  document.addEventListener('keydown', e => key(e, true));
  document.addEventListener('keyup', e => key(e, false));
}
function vcb01WireMouse(cv) {
  if (cv.dataset.wired) return; cv.dataset.wired = '1';
  cv.addEventListener('mousemove', e => {
    let dx = e.movementX | 0, dy = e.movementY | 0;
    if (dx || dy) {
      dx = Math.max(-32768, Math.min(32767, dx)); dy = Math.max(-32768, Math.min(32767, dy));
      vcb01Send([0x11, (dx >> 8) & 255, dx & 255, (dy >> 8) & 255, dy & 255]);
    }
    if (VCB01D.w) {
      const ax = Math.max(0, Math.min(1023, Math.round(e.offsetX * VCB01D.w / cv.clientWidth)));
      const ay = Math.max(0, Math.min(1023, Math.round(e.offsetY * VCB01D.h / cv.clientHeight)));
      vcb01Send([0x13, (ax >> 8) & 255, ax & 255, (ay >> 8) & 255, ay & 255]);
    }
  });
  const btn = e => { const b = { 0: 1, 1: 2, 2: 3 }[e.button]; if (!b) return;
    e.preventDefault(); vcb01Send([0x12, b, e.type === 'mousedown' ? 1 : 0]); };
  cv.addEventListener('mousedown', e => { cv.focus(); btn(e); });
  cv.addEventListener('mouseup', btn);
  cv.addEventListener('contextmenu', e => e.preventDefault());
}

/* ---------------- modals (imperative promise overlays) ---------------- */
function confirmModal(title, body, confirmLabel) {
  return new Promise(resolve => {
    const host = document.createElement('div');
    host.className = 'modal-overlay';
    host.innerHTML =
      '<div class="card modal-card"><div class="card-head"><h3>' + esc(title) + '</h3>' +
        '<button class="modal-close" data-cm-no aria-label="Close" title="Close">&times;</button></div>' +
      '<div class="card-body"><p class="muted" style="margin:0 0 16px; font-size:var(--fs-1)">' + body + '</p>' +
        '<div style="display:flex; gap:8px; justify-content:flex-end">' +
          '<button class="btn" data-cm-no>Cancel</button>' +
          '<button class="btn danger" data-cm-yes>' + esc(confirmLabel) + '</button></div></div></div>';
    const done = v => { host.remove(); document.removeEventListener('keydown', onKey); resolve(v); };
    function onKey(ev) { if (ev.key === 'Escape') done(false); }
    host.addEventListener('click', ev => {
      if (ev.target === host || ev.target.closest('[data-cm-no]')) done(false);
      else if (ev.target.closest('[data-cm-yes]')) done(true); });
    document.addEventListener('keydown', onKey);
    document.body.appendChild(host);
    host.querySelector('[data-cm-yes]').focus();
  });
}
async function pickImage(title, emptyLabel, current) {
  const images = await fetch('/api/images').then(r => r.json()).catch(() => []);
  const now = imageLabel(current || '');
  const rows = images.map(im =>
    '<button class="pick-row' + (im.name === now ? ' current' : '') + '" data-pick-name="' + esc(im.name) + '">' +
      '<span class="mono">' + esc(im.name) + '</span>' +
      (im.name === now ? '<span class="chip ok">loaded</span>' : '') +
      '<span class="muted mono" style="font-size:var(--fs-0)">' + humanSize(im.size) + '</span></button>').join('') ||
    '<div class="muted" style="padding:8px">No images uploaded — add one on the Storage page.</div>';
  return new Promise(resolve => {
    const host = document.createElement('div');
    host.className = 'modal-overlay';
    host.innerHTML =
      '<div class="card modal-card"><div class="card-head"><h3>' + esc(title) + '</h3>' +
        '<button class="modal-close" data-pick-close aria-label="Close" title="Close">&times;</button></div>' +
      '<div class="pick-list">' + rows +
        '<button class="pick-row' + (now ? '' : ' current') + '" data-pick-name="">' +
          '<span class="muted">' + esc(emptyLabel) + '</span></button></div></div>';
    const done = v => { host.remove(); document.removeEventListener('keydown', onKey); resolve(v); };
    function onKey(e2) { if (e2.key === 'Escape') done(null); }
    host.addEventListener('click', e => {
      if (e.target === host || e.target.closest('[data-pick-close]')) { done(null); return; }
      const row = e.target.closest('[data-pick-name]'); if (row) done(row.dataset.pickName); });
    document.addEventListener('keydown', onKey);
    document.body.appendChild(host);
  });
}
function setPasswordModal(minLength) {
  return new Promise(resolve => {
    const host = document.createElement('div');
    host.className = 'modal-overlay';
    host.innerHTML =
      '<div class="card modal-card"><div class="card-head"><h3>Set an admin password</h3></div>' +
      '<div class="card-body"><p class="muted" style="margin:0 0 16px; font-size:var(--fs-1)">' +
        'This interface controls the machine and is open to anyone who can reach it until a password ' +
        'is set. At least ' + minLength + ' characters. Any user name is accepted when the browser asks.</p>' +
      '<div class="set-grid">' +
        '<label class="set-name" for="pw1">Password</label>' +
        '<input class="set-val" id="pw1" type="password" autocomplete="new-password">' +
        '<label class="set-name" for="pw2">Repeat</label>' +
        '<input class="set-val" id="pw2" type="password" autocomplete="new-password"></div>' +
      '<p id="pw-err" class="muted" style="margin:12px 0 0; font-size:var(--fs-1); color:var(--err); min-height:1.2em"></p>' +
      '<div style="display:flex; gap:8px; justify-content:flex-end; margin-top:16px">' +
        '<button class="btn primary" data-pw-set>Set password</button></div></div></div>';
    const err = msg => { host.querySelector('#pw-err').textContent = msg || ''; };
    async function submit() {
      const p1 = host.querySelector('#pw1').value, p2 = host.querySelector('#pw2').value;
      if (p1.length < minLength) return err('At least ' + minLength + ' characters.');
      if (p1 !== p2) return err('The two entries do not match.');
      err('');
      const res = await apiJSON('/api/auth', { method: 'PUT',
        headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: p1 }) }).catch(() => ({ ok: false, data: {} }));
      if (!res.ok) return err(res.data.error || 'The password could not be set.');
      host.remove(); toast('auth', 'Admin password set'); resolve(true);
    }
    host.addEventListener('click', ev => { if (ev.target.closest('[data-pw-set]')) submit(); });
    host.addEventListener('keydown', ev => { if (ev.key === 'Enter') submit(); });
    document.body.appendChild(host);
    host.querySelector('#pw1').focus();
  });
}
async function checkAuth() {
  const r = await fetch('/api/auth');
  if (!r.ok) return;
  const auth = await r.json();
  if (auth.configured) return;
  await setPasswordModal(auth.min_length || 8);
}

const ARM_MS = 5000;
function DangerButton({ action, label, armLabel, onFire }) {
  const [armed, setArmed] = useState(false);
  const timer = useRef(null);
  useEffect(() => () => clearTimeout(timer.current), []);
  useEffect(() => {
    const off = e => { if (!e.target.closest('[data-danger="' + action + '"]')) setArmed(false); };
    document.addEventListener('click', off);
    return () => document.removeEventListener('click', off);
  }, [action]);
  const click = e => {
    e.stopPropagation();
    if (!armed) { setArmed(true); clearTimeout(timer.current); timer.current = setTimeout(() => setArmed(false), ARM_MS); return; }
    setArmed(false); onFire();
  };
  return html`<button class=${'btn danger' + (armed ? ' armed' : '')} data-danger=${action} onClick=${click}>
    <span class="lbl"><span class="idle">${label}</span><span class="armed-lbl">${armLabel}</span></span></button>`;
}

const RA81_SWITCHES = new Map();
function ra81Switches(name) { if (!RA81_SWITCHES.has(name)) RA81_SWITCHES.set(name, { wp: false, fault: false }); return RA81_SWITCHES.get(name); }
function Ra81Widget({ d }) {

    <button class=${'lampbtn cap-red' + (sw.fault ? ' lit' : '')}

    ${html`<${ReadyCap} unit=${unit} lit=${mounted && !active} wide=${true} />`}
    <button class=${'lampbtn cap-yellow' + (sw.wp ? ' lit' : '')} onClick=${() => toggle('wp')}>WRITE<br />PROT</button>

const WIDGET_MODELS = { RL02: RlWidget, RL01: RlWidget, RA81: Ra81Widget, VCB01: Vcb01Widget };
const WIDGET_CATEGORIES = { disk: DiskWidget, network: NetworkWidget, tape: TapeWidget };

/* ---- storage page ---- */
function uploadImage(file, setStatus) {
  const form = new FormData();
  form.append('file', file, file.name);
  const xhr = new XMLHttpRequest();
  xhr.open('POST', '/api/images');
  xhr.upload.onprogress = ev => { if (ev.lengthComputable)
    setStatus('Uploading ' + file.name + ' — ' + Math.round(100 * ev.loaded / ev.total) + '%'); };
  xhr.onload = () => {
    setStatus(xhr.status === 200 ? 'Uploaded ' + file.name : 'Upload failed: ' + xhr.responseText);
    toast('POST /api/images', xhr.status === 200 ? file.name + ' uploaded' : 'upload failed');
    refreshImages().catch(() => {});
  };
  xhr.onerror = () => setStatus('Upload failed.');
  xhr.send(form);
}
function ImageUsage({ im }) {
  const parts = [];
  (im.used || []).forEach(u => parts.push(html`<span class="chip out mono" title="named by a saved configuration">${u.config}:${u.device}</span>`));
  (im.attached || []).forEach(d => parts.push(html`<span class="chip ok mono" title="mounted on this drive now">${d} mounted</span>`));
  return parts.length ? html`${parts}` : html`<span class="muted">—</span>`;
}
function DelButton({ label, confirmLabel, onConfirm }) {
  const [armed, setArmed] = useState(false);
  const timer = useRef(null);
  useEffect(() => () => clearTimeout(timer.current), []);
  return html`<button class="btn small" onClick=${() => {
    if (!armed) { setArmed(true); clearTimeout(timer.current); timer.current = setTimeout(() => setArmed(false), 3000); return; }
    setArmed(false); onConfirm();
  }}>${armed ? confirmLabel : label}</button>`;
}

/* ---- configurations page ---- */
function cfgKey(snap) {
  return ((snap || {}).devices || []).filter(d => d.enabled).map(d => {
    const p = d.params || {};
    return d.name + '{' + Object.keys(p).sort().map(k => k + '=' + p[k]).join(',') + '}';
  }).sort().join('|');
}
function cfgDriveNames() { const out = []; walkDevs(d => { if (d.params && d.params.some(p => p.n === 'image')) out.push(d.name); }); return out; }
async function loadConfigs() {
  const r = await fetch('/api/configs');
  if (!r.ok) throw new Error('configs fetch failed');
  const configs = await r.json();
  let current = null;
  try { const cr = await fetch('/api/configs?current=1', { signal: AbortSignal.timeout(4000) });
    if (cr.ok) current = await cr.json(); } catch (e) {}
  const currentKey = current && cfgKey(current);
  await Promise.all(configs.map(async c => {
    c.snapshot = await fetch('/api/configs/' + encodeURIComponent(c.name),
      { signal: AbortSignal.timeout(4000) }).then(x => x.json()).catch(() => null);
    c.loaded = current != null && c.snapshot != null && cfgKey(c.snapshot) === currentKey;
  }));
  setStore({ configs });
}
async function setConfigImage(cfgName, drive, current) {
  const name = await pickImage('Image for ' + drive + ' in “' + cfgName + '”', 'No image — leave the drive empty', current);
  if (name === null) return;
  const res = await apiJSON('/api/configs/' + encodeURIComponent(cfgName) + '/devices/' + encodeURIComponent(drive) + '/image', {
    method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ value: name }) });
  toast(cfgName + ':' + drive + ' = ' + (name || '""'), res.ok ? 'configuration updated' : (res.data.error || 'rejected'));
  await loadConfigs().catch(() => {});
  refreshImages().catch(() => {});
}
function CfgDevices({ cfgName, snap }) {
  const devs = ((snap || {}).devices || []).filter(d => d.enabled);
  if (!devs.length)
    return html`<div class="muted" style="padding:10px 14px; font-size:var(--fs-1)">This configuration switches every device off.</div>`;
  const drives = cfgDriveNames();
  return devs.map(d => {
    const names = Object.keys(d.params || {}).sort().filter(n => n !== 'image');
    const takesImage = drives.indexOf(d.name) !== -1;
    const img = (d.params || {}).image || '';
    return html`<div key=${d.name}>
      <div class="dev-sub"><span class="devname">${d.name}</span><span class="spacer"></span><span class="chip ok">enabled</span></div>
      <div class="params">${names.length || takesImage
        ? html`<div class="p-grid">
            ${takesImage ? html`<div class="p-name">image</div>
              <div class="p-val"><button class="btn small" onClick=${() => setConfigImage(cfgName, d.name, img)}>
                ${img ? imageLabel(img) : 'no image'} · change…</button></div>
              <div class="p-info">the medium this drive starts with</div>` : null}
            ${names.map(n => html`<div class="p-name">${n}</div>
              <div class="p-val"><span class="ro">${String(d.params[n])}</span></div><div class="p-info"></div>`)}</div>`
        : html`<span class="muted" style="font-size:var(--fs-1)">all parameters at their defaults</span>`}</div></div>`;
  });
}
function CfgRow({ c, halted }) {
  const [open, setOpen] = useState(false);
  const apply = async () => {
    if (!halted && !await confirmModal('Apply while the PDP-11 is running?',
        'The CPU is running. Applying <b>' + esc(c.name) + '</b> reconfigures every device — drives are detached ' +
        'and reattached, and the running system will not survive it.', 'Apply anyway')) return;
    const res = await apiJSON('/api/configs/' + encodeURIComponent(c.name) + '/apply', { method: 'POST' });
    toast('POST /api/configs/' + c.name + '/apply', res.ok && res.data.ok ? 'configuration applied'
      : 'applied with rejections: ' + ((res.data.errors || []).join('; ') || 'request failed'));
    refreshDevices().catch(() => {}); loadConfigs().catch(() => {});
  };
  const del = () => fetch('/api/configs/' + encodeURIComponent(c.name), { method: 'DELETE' }).then(r => {
    toast('DELETE /api/configs/' + c.name, r.ok ? 'configuration deleted' : 'delete failed'); loadConfigs().catch(() => {});
  });
  return html`<div class="card cfg-row">
    <div class="card-head">
      <h3>${c.name}</h3>
      <span class="muted" style="font-size:var(--fs-0)">${c.mtime}</span>
      ${c.loaded ? html`<span class="chip ok">loaded</span>` : null}
      ${(c.enabled || []).map(d => html`<span class="chip out">${d}</span>`)}
      <span style="margin-left:auto; display:flex; gap:8px">
        <button class="btn small" onClick=${() => setOpen(o => !o)}>View</button>
        <button class="btn small primary" disabled=${c.loaded} title=${c.loaded ? 'already loaded' : ''} onClick=${apply}>Apply</button>
        <${DelButton} label="Delete" confirmLabel="Confirm delete" onConfirm=${del} />

  </div>`;
}
function ConfigsPage({ s }) {

    const r = await fetch('/api/configs/' + encodeURIComponent(name.trim()), { method: 'PUT' });
    toast('PUT /api/configs/' + name.trim(), r.ok ? 'current setup saved' : 'save failed');

/* ---- log page ---- */
function LogPage({ s }) {
  useStore();
  const boxRef = useRef(null);
  const rows = s.log.filter(l => s.activeLevels.has(l.lvl));
  const clsOf = l => ({ FATAL:'err', ERROR:'err', WARNING:'warn', INFO:'ok', DEBUG:'off' }[l.lvl]);
  const toggle = lvl => { s.activeLevels.has(lvl) ? s.activeLevels.delete(lvl) : s.activeLevels.add(lvl); emit(); };
  return html`<section class="page active" data-page="log">
    <div class="card logcard">
      <div class="card-head"><div class="filter-row" style="margin:0 0 0 auto">
        ${[['ERROR','err','error'], ['WARNING','warn','warning'], ['INFO','ok','info'], ['DEBUG','off','debug']].map(([lvl, cls, label]) =>
          html`<span class=${'chip ' + cls + (s.activeLevels.has(lvl) ? '' : ' inactive')} onClick=${() => toggle(lvl)}>${label}</span>`)}
      </div></div>
      <div class="card-body logbox" ref=${boxRef}>${rows.map((l, i) => html`
        <div key=${i} style="padding:3px 0; border-bottom:1px solid var(--line-soft)">
          <span class="muted">${l.t}</span> <span class=${'chip ' + clsOf(l)}>${l.lvl.toLowerCase()}</span>${' '}

    <${Sidebar} page=${page} platform=${s.platform} />
    <div class="main">
      <${Topbar} page=${page} hw=${s.hw} settings=${s.settings} connected=${s.connected} />
      <main class="content">${pageEl}</main>
    </div></div>`;
}

render(html`<${App} />`, document.getElementById('app'));

/* ---------------- boot ---------------- */
async function initLive() {
  try {
    const st = await fetch('/api/state');
    if (!st.ok) throw new Error();
    const state = await st.json();
    setStore({ imagesDir: state.images_dir || '', platform: state.platform || '' });
    await checkAuth().catch(() => {});
    await refreshDevices();
    setStore({ connected: true });
    await refreshSettings().catch(() => {});
    initEvents();
  } catch (e) {
    setStore({ connected: false });
  }
}
initLive();

/* Close every WebSocket when the page goes away, so a reload or navigation
   frees the server's per-socket worker thread at once rather than leaving it
   to the ping/pong timeout. */
window.addEventListener('pagehide', () => {
  const shut = ws => { try { if (ws) { ws.onclose = null; ws.close(); } } catch (e) {} };
  shut(eventsWs);
  shut(extWs);
  shut(VCB01D.ws);
  if (TERMS) for (const k of Object.keys(TERMS)) shut(TERMS[k].ws);
});
</script>
</body>
